networks:
  coolify:
    external: true

services:

  # ─── PostgREST ──────────────────────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.8
    environment:
      PGRST_DB_URI: ${DATABASE_URL}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: postgres
      PGRST_JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me-at-least-32-chars}
    networks:
      - coolify
    restart: unless-stopped

  # ─── Admin service (also runs DB schema init on startup) ─────────────────────
  admin-service:
    build:
      context: .
      target: admin-service
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me-at-least-32-chars}
      ADMIN_PORT: "54325"
    networks:
      - coolify
    restart: unless-stopped

  # ─── Gateway ────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      target: gateway
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me-at-least-32-chars}
      GATEWAY_PORT: "54321"
      POSTGREST_URL: http://postgrest:3000
      FUNCTIONS_URL: http://functions-runner:54322
      REALTIME_URL: http://realtime:54323
      STORAGE_URL: http://storage:54324
      ADMIN_URL: http://admin-service:54325
    networks:
      - coolify
    restart: unless-stopped

  # ─── Functions runner ────────────────────────────────────────────────────────
  functions-runner:
    build:
      context: .
      target: functions-runner
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me-at-least-32-chars}
      FUNCTIONS_PORT: "54322"
      FUNCTIONS_DIR: /app/examples/functions
    networks:
      - coolify
    restart: unless-stopped

  # ─── Realtime ────────────────────────────────────────────────────────────────
  realtime:
    build:
      context: .
      target: realtime
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me-at-least-32-chars}
      REALTIME_PORT: "54323"
    networks:
      - coolify
    restart: unless-stopped

  # ─── Storage ─────────────────────────────────────────────────────────────────
  storage:
    build:
      context: .
      target: storage
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me-at-least-32-chars}
      STORAGE_PORT: "54324"
      STORAGE_DIR: /data/storage
    volumes:
      - storage-data:/data/storage
    networks:
      - coolify
    restart: unless-stopped

  # ─── Admin UI ─────────────────────────────────────────────────────────────────
  admin-ui:
    build:
      context: .
      target: admin-ui
    environment:
      GATEWAY_URL: ${GATEWAY_URL:-http://gateway:54321}
      PORT: "3000"
    expose:
      - "3000"
    networks:
      - coolify
    restart: unless-stopped
    depends_on:
      - gateway

volumes:
  storage-data:
