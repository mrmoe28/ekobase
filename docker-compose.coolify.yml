networks:
  coolify:
    external: true

volumes:
  postgres-data:
  storage-data:

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    command: postgres -c unix_socket_directories=''
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─── PostgREST ──────────────────────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.8
    environment:
      PGRST_DB_URI: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
      PGRST_DB_SCHEMAS: "public,proj_fbe4ecd703954909,proj_577e06dea1c54d2b,proj_f38f72738f4c46f0,proj_87a5f6af442e4231,proj_75ce0d135acd4740,proj_56f5a158d1fc4fac,proj_71a7261327154f3c,proj_781596e0441749e5,proj_239184b2523448a9"
      PGRST_DB_ANON_ROLE: postgres
      PGRST_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to a strong random value}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - coolify
    restart: unless-stopped

  # ─── Admin service (also runs DB schema init on startup) ─────────────────────
  admin-service:
    build:
      context: .
      target: admin-service
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to a strong random value}
      ADMIN_PORT: "54325"
      POSTGREST_DB_ROLE: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - coolify
    restart: unless-stopped

  # ─── Gateway ────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      target: gateway
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to a strong random value}
      GATEWAY_PORT: "54321"
      POSTGREST_URL: http://postgrest:3000
      FUNCTIONS_URL: http://functions-runner:54322
      REALTIME_URL: http://realtime:54323
      STORAGE_URL: http://storage:54324
      ADMIN_URL: http://admin-service:54325
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "54321:54321"
    networks:
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.supabase-clone-gateway-http.rule=Host(`supabase.ekodevops.com`) && (PathPrefix(`/rest`) || PathPrefix(`/auth`) || PathPrefix(`/storage`) || PathPrefix(`/realtime`) || PathPrefix(`/functions`) || PathPrefix(`/admin`))"
      - "traefik.http.routers.supabase-clone-gateway-http.entryPoints=http"
      - "traefik.http.routers.supabase-clone-gateway-http.service=supabase-clone-gateway"
      - "traefik.http.routers.supabase-clone-gateway-https.rule=Host(`supabase.ekodevops.com`) && (PathPrefix(`/rest`) || PathPrefix(`/auth`) || PathPrefix(`/storage`) || PathPrefix(`/realtime`) || PathPrefix(`/functions`) || PathPrefix(`/admin`))"
      - "traefik.http.routers.supabase-clone-gateway-https.entryPoints=https"
      - "traefik.http.routers.supabase-clone-gateway-https.tls=true"
      - "traefik.http.routers.supabase-clone-gateway-https.service=supabase-clone-gateway"
      - "traefik.http.services.supabase-clone-gateway.loadbalancer.server.port=54321"

  # ─── Functions runner ────────────────────────────────────────────────────────
  functions-runner:
    build:
      context: .
      target: functions-runner
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to a strong random value}
      FUNCTIONS_PORT: "54322"
      FUNCTIONS_DIR: /app/examples/functions
      # ── shared by all functions that call back into EkoBase ──
      SUPABASE_URL: ${SUPABASE_URL:-https://supabase.ekodevops.com}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # ── square-oauth ──
      SQUARE_APP_ID: ${SQUARE_APP_ID}
      SQUARE_APP_SECRET: ${SQUARE_APP_SECRET}
      SQUARE_ENVIRONMENT: ${SQUARE_ENVIRONMENT:-production}
      APP_URL: ${APP_URL:-https://ops.lock28.com}
    networks:
      - coolify
    restart: unless-stopped

  # ─── Realtime ────────────────────────────────────────────────────────────────
  realtime:
    build:
      context: .
      target: realtime
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to a strong random value}
      REALTIME_PORT: "54323"
    networks:
      - coolify
    restart: unless-stopped

  # ─── Storage ─────────────────────────────────────────────────────────────────
  storage:
    build:
      context: .
      target: storage
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to a strong random value}
      STORAGE_PORT: "54324"
      STORAGE_DIR: /data/storage
    volumes:
      - storage-data:/data/storage
    networks:
      - coolify
    restart: unless-stopped

  # ─── Admin UI ─────────────────────────────────────────────────────────────────
  admin-ui:
    build:
      context: .
      target: admin-ui
    environment:
      GATEWAY_URL: ${GATEWAY_URL:-http://gateway:54321}
      PORT: "3000"
    ports:
      - "3000:3000"
    networks:
      - coolify
    restart: unless-stopped
    # Next.js (tokio signal handler) hits EACCES on socketpair() under the
    # LXC's default AppArmor profile; unconfining this single container
    # avoids the crash without weakening the rest of the stack.
    security_opt:
      - apparmor:unconfined
    depends_on:
      - gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.supabase-clone-adminui-http.rule=Host(`admin.supabase.ekodevops.com`)"
      - "traefik.http.routers.supabase-clone-adminui-http.entryPoints=http"
      - "traefik.http.routers.supabase-clone-adminui-http.service=supabase-clone-adminui"
      - "traefik.http.routers.supabase-clone-adminui-http.priority=200"
      - "traefik.http.routers.supabase-clone-adminui-https.rule=Host(`admin.supabase.ekodevops.com`)"
      - "traefik.http.routers.supabase-clone-adminui-https.entryPoints=https"
      - "traefik.http.routers.supabase-clone-adminui-https.tls=true"
      - "traefik.http.routers.supabase-clone-adminui-https.service=supabase-clone-adminui"
      - "traefik.http.routers.supabase-clone-adminui-https.priority=200"
      - "traefik.http.services.supabase-clone-adminui.loadbalancer.server.port=3000"
